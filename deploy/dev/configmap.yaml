apiVersion: v1
kind: ConfigMap
metadata:
  name: osac-config
  namespace: osac-dev
data:
  PORT: '8080'
  HOST: '0.0.0.0'
  LOG_LEVEL: 'info'
  FULFILLMENT_API_URL: 'https://fulfillment.example.com/api'
  # OIDC client_id registered in Keycloak (realm: osac) for this UI application.
  # The issuer URL is discovered automatically from the fulfillment /capabilities endpoint.
  OIDC_CLIENT_ID: 'osac-ui'
  # Public base URL of the UI; used to compute the /callback redirect URI.
  # Must match the redirect URI registered in Keycloak.
  # BASE_UI_URL: 'https://ui.example.com'
  # Optional TLS settings for upstream fulfillment API:
  # FULFILLMENT_TLS_CA_FILE: '/etc/certs/ca.pem'
  # TEMP_FULFILLMENT_TLS_INSECURE: '1'
  # Optional TLS settings for OIDC IdP (Keycloak); set to '1' for self-signed certs in dev:
  # OIDC_TLS_INSECURE: '1'
  # Temporary static bearer workarounds — remove when OIDC is wired in all environments:
  # TEMP_FULFILLMENT_STATIC_BEARER: '<service-account-token>'
  # TEMP_FULFILLMENT_STATIC_BEARER_FORCE: '1'
